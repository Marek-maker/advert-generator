services:
  - type: web
    name: advert-generator-backend
    runtime: python
    repo: https://github.com/Marek-maker/advert-generator
    branch: main
    buildCommand: ""
    startCommand: python server.py
    healthCheckPath: /
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PORT
        value: 8080
      - key: PYTHON_VERSION
        value: 3.11.0
